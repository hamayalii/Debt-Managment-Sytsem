<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Debt Manager</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="top-navbar">
      <h2 class="logo" th:text="${globalSettings.storeName}">دەفتەری قەرز</h2>
      <div>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle"><i class="fas fa-bars"></i></label>
        <div class="sidebar-menu">
          <a href="/Debt">سەرەکی</a>
          <a href="/history">مێژووی پارەدان</a>
          <a href="/archives">ئەرشیفی قەرزەکان</a>
          <a href="/settings">ڕێکخستنەکان</a>
        </div>
      </div>
    </nav>
    <main>
      <table class="debt-table">
        <thead>
          <tr>
            <th style="color: black">ناوی كڕیار</th>
            <th style="color: black">بڕی قەرز(هەزار دینار)</th>
            <th style="color: black">بڕی قەرز(دۆلار)</th>
            <th style="color: black">ژمارەی تەلەفۆن</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="debt : ${archives}">
            <td th:text="${debt.customerName}" style="color: black"></td>
            <td>
              <span
                th:if="${debt.currency == 'IQD'}"
                th:text="${debt.amount} + ' ' + 'IQD'"
                style="color: black"
              ></span>
              <span
                th:if="${debt.currency == 'USD'}"
                th:text="${#numbers.formatDecimal(debt.amount * (usdRate / 100.0), 1, 2)} + ' ' + 'IQD'"
                style="color: black"
              ></span>
            </td>

            <td>
              <span
                th:if="${debt.currency == 'USD'}"
                th:text="'$' + ${debt.amount} + ' ' + 'USD'"
                style="color: black"
              ></span>
              <span
                th:if="${debt.currency == 'IQD'}"
                th:text="'$' + ${#numbers.formatDecimal(debt.amount / (usdRate / 100.0), 1, 2)} + ' ' + 'USD'"
                style="color: black"
              ></span>
            </td>
            <td th:text="${debt.phoneNumber}" style="color: black"></td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
